# Render Blueprint for the FIGAS Remix application.
# Docs: https://render.com/docs/blueprint-spec
#
# This provisions a persistent Node web service (ideal for the app's
# Server-Sent Events endpoint at /api/schedule-events and the singleton
# Prisma connection pool) plus a managed PostgreSQL 16 database.
#
# After first deploy, set the secret env vars marked `sync: false` in the
# Render dashboard (Stripe keys, SMTP credentials, APP_URL).

databases:
  - name: figas-db
    databaseName: figas
    postgresMajorVersion: "16"
    plan: basic-256mb # trial: `free` (expires after 30 days). Scale up as needed.
    region: oregon

services:
  - type: web
    name: figas
    runtime: node
    plan: starter # `starter`+ keeps the service always-on (required for SSE) and
    # enables preDeployCommand. `free` spins down and does not support preDeploy.
    region: oregon
    branch: main
    numInstances: 1 # keep at 1: in-process SSE state + per-process DB pool.
    autoDeploy: true
    # `npm ci` runs the `postinstall` hook (prisma generate) before the build.
    buildCommand: npm ci && npm run build
    # Syncs the database schema to prisma/schema.prisma before each deploy goes
    # live. Idempotent; fails safely (no --accept-data-loss) if a change would
    # drop data. Seed data is loaded once via Render Shell (see README/SETUP).
    preDeployCommand: npm run db:push
    startCommand: npm run start
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.12.0 # Prisma 7 requires Node >= 20.19 / 22.12 / 24; 22.12 is current LTS
      # Wired automatically from the managed database above.
      - key: DATABASE_URL
        fromDatabase:
          name: figas-db
          property: connectionString
      # Auto-generated strong secrets (persist across deploys once created).
      - key: SESSION_SECRET
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      # -- Secrets to set in the dashboard (sync: false) ----------------------
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: APP_URL # e.g. https://figas.onrender.com — used for links & Stripe redirects
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      # -- Non-secret configuration -------------------------------------------
      - key: STRIPE_API_VERSION
        value: 2026-04-22.dahlia
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: CONTACT_EMAIL
        value: ops@figas.gov.fk
      - key: CONTACT_PHONE
        value: "+500 27219"
      - key: SYSTEM_EMAIL
        value: system@figas.gov.fk
      - key: WB_VIOLATIONS_BLOCK_APPROVAL
        value: "false"
